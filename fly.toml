app = "humildade-e-justica"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  count = 1

[[mounts]]
  source = "data"
  destination = "/data"

[env]
  DATABASE_PATH = "/data/masonic_lodge.db"
  NODE_ENV = "production"
